name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Source/Android/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Manuell via GitHub UI auslösbar

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Java 17 (Gradle 8.x braucht min. Java 17) ────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Android SDK (wird von GitHub Actions bereitgestellt) ──────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Gradle Wrapper ausführbar machen ──────────────────────────────────────
      - name: Make gradlew executable
        working-directory: Source/Android
        run: chmod +x gradlew

      # ── Gradle Wrapper herunterladen (falls noch nicht gecacht) ───────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          build-root-directory: Source/Android

      # ── Debug APK bauen ───────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: Source/Android
        run: ./gradlew assembleDebug --stacktrace

      # ── APK hochladen als Artefakt (7 Tage downloadbar) ──────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: papiersammlung-debug-${{ github.run_number }}
          path: Source/Android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── Bei Push auf main: auch Release-APK (unsigned) ───────────────────────
      - name: Build Release APK (unsigned)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: Source/Android
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: papiersammlung-release-unsigned-${{ github.run_number }}
          path: Source/Android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
